# Links hub data — consumed by links.html
# Fields:
#   groups[].id          stable slug for anchors / styling
#   groups[].title       display heading
#   groups[].subtitle    one-line description under heading
#   groups[].accent      chapter accent color (hex)
#   groups[].bg          generated backdrop (gradient + optional photo)
#   groups[].links[]     name + url (+ optional note, tags)

intro:
  cover: /images/links-me-bg.jpg
  photo_opacity: 0.55
  gradient:
    from: "#050508"
    via: "#0f172a"
    to: "#1e293b"
  glow: "#2563eb"

groups:
