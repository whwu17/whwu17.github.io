<svg class="liquid-glass-svg" aria-hidden="true" width="0" height="0" focusable="false" style="position:absolute;overflow:hidden">
  <defs>
    <!--
      iOS 26 / ekino-style lensing — feImage displacement maps + scale ~30
      Chromium: backdrop-filter on ::before. Safari: CSS chromatic edge fallback.
    -->

    <filter id="lg-refract-pill" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feImage href="/assets/svg/glass-disp-pill.svg" preserveAspectRatio="none" result="dispMap" />
      <feDisplacementMap in="SourceGraphic" in2="dispMap" scale="36" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <filter id="lg-refract-bar" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feImage href="/assets/svg/glass-disp-bar.svg" preserveAspectRatio="none" result="dispMap" />
      <feDisplacementMap in="SourceGraphic" in2="dispMap" scale="26" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <filter id="lg-refract" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feImage href="/assets/svg/glass-disp-panel.svg" preserveAspectRatio="none" result="dispMap" />
      <feDisplacementMap in="SourceGraphic" in2="dispMap" scale="28" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <filter id="lg-refract-chrome" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feImage href="/assets/svg/glass-disp-panel.svg" preserveAspectRatio="none" result="dispMap" />
      <feDisplacementMap in="SourceGraphic" in2="dispMap" scale="24" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>
