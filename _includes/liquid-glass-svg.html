<svg class="liquid-glass-svg" aria-hidden="true" width="0" height="0" focusable="false" style="position:absolute;overflow:hidden">
  <defs>
    <!--
      iOS 26 edge lensing — displacement weighted to rim (center stays clear).
    <filter id="lg-refract" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="14 18" numOctaves="2" seed="11" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1.2" result="soft" />
      <feImage preserveAspectRatio="none" result="edgeMask"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='52%25'%3E%3Cstop offset='0%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='58%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='100%25' stop-color='white' stop-opacity='1'/%3E%3C/radialGradient%3E%3Crect width='100' height='100' fill='url(%23g)'/%3E%3C/svg%3E" />
      <feComposite in="soft" in2="edgeMask" operator="in" result="edgeNoise" />
      <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="7" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <!-- Nav / chrome — slightly stronger lensing -->
    <filter id="lg-refract-chrome" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="11 15" numOctaves="2" seed="4" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1" result="soft" />
      <feImage preserveAspectRatio="none" result="edgeMask"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='52%25'%3E%3Cstop offset='0%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='55%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='100%25' stop-color='white' stop-opacity='1'/%3E%3C/radialGradient%3E%3Crect width='100' height='100' fill='url(%23g)'/%3E%3C/svg%3E" />
      <feComposite in="soft" in2="edgeMask" operator="in" result="edgeNoise" />
      <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="9" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <!-- Pills / link rows — tight edge warp on rounded caps -->
    <filter id="lg-refract-pill" filterUnits="objectBoundingBox" primitiveUnits="objectBoundingBox" x="0" y="0" width="1" height="1" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="18 24" numOctaves="2" seed="19" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1.4" result="soft" />
      <feImage preserveAspectRatio="none" result="edgeMask"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='54%25'%3E%3Cstop offset='0%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='62%25' stop-color='white' stop-opacity='0'/%3E%3Cstop offset='100%25' stop-color='white' stop-opacity='1'/%3E%3C/radialGradient%3E%3Crect width='100' height='100' fill='url(%23g)'/%3E%3C/svg%3E" />
      <feComposite in="soft" in2="edgeMask" operator="in" result="edgeNoise" />
      <feDisplacementMap in="SourceGraphic" in2="edgeNoise" scale="8" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>
