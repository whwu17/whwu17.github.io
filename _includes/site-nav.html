<nav class="nav liquid-glass liquid-glass--chrome" id="site-nav">
  <a class="brand" href="{{ '/' | relative_url }}">{{ site.author.name | default: site.title }}</a>

  <div class="nav-links liquid-glass liquid-glass--chrome" id="nav-links">
    {% assign secs = site.sections | sort: 'priority' %}
    {% for s in secs %}
    <a href="{{ '/#' | append: s.section_id | relative_url }}" data-spy="{{ s.section_id }}">{{ s.name }}</a>
    {% endfor %}
    <a href="{{ '/about/' | relative_url }}">About</a>
    <a href="{{ '/contact/' | relative_url }}">Contact</a>
  </div>

  <div class="nav-actions">
    <button class="glass-control liquid-glass liquid-glass--chrome nav-toggle" id="nav-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
      <svg class="nav-toggle__menu" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16"></path>
      </svg>
      <svg class="nav-toggle__close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18"></path>
      </svg>
    </button>
  </div>
</nav>
<div class="nav-scrim" id="nav-scrim" hidden aria-hidden="true"></div>
