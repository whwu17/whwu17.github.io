<style id="nav-critical">
  #nav-links .nav__drawer-panel {
    clip-path: inset(0 0 100% 0) !important;
    -webkit-clip-path: inset(0 0 100% 0) !important;
  }
  #nav-scrim {
    display: block !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }
  #site-header.is-nav-open #nav-links .nav__drawer-panel {
    clip-path: inset(0 0 0 0) !important;
    -webkit-clip-path: inset(0 0 0 0) !important;
  }
  #site-header.is-nav-open #nav-scrim {
    opacity: 1 !important;
    pointer-events: auto !important;
  }
</style>
<header class="site-header" id="site-header">
  <nav class="nav liquid-glass liquid-glass--chrome" id="site-nav" aria-label="Main">
    <a class="nav__brand" href="{{ '/' | relative_url }}">{{ site.author.name | default: site.title }}</a>
    <div class="nav__slot" aria-hidden="true"></div>
  </nav>

  <div class="nav__stack" id="nav-stack">
    <button class="nav__menu" id="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="nav-links">
      <span class="nav__menu-icon" aria-hidden="true">
        <span class="nav__menu-bar"></span>
        <span class="nav__menu-bar"></span>
        <span class="nav__menu-bar"></span>
      </span>
    </button>

    <div class="nav__drawer" id="nav-links" role="navigation" aria-label="Sections" aria-hidden="true">
      <div class="nav__drawer-panel">
        {% assign secs = site.sections | sort: 'priority' %}
        {% for s in secs %}
        <a href="{{ '/#' | append: s.section_id | relative_url }}" data-spy="{{ s.section_id }}"><span class="nav__drawer-label">{{ s.name }}</span></a>
        {% endfor %}
        <a href="{{ '/about/' | relative_url }}"><span class="nav__drawer-label">About</span></a>
        <a href="{{ '/contact/' | relative_url }}"><span class="nav__drawer-label">Contact</span></a>
      </div>
    </div>
  </div>

  <div class="nav__scrim" id="nav-scrim" aria-hidden="true"></div>
</header>
