# ---------------------------------------------------------------

slogen: "Less a portfolio, more a small living room. Welcome in."

author:
  name           : "Wu Wenhan"
  avatar         : "/images/profile.png"
  position       : "Software engineer · researcher"
  location       : "Shanghai, China"
  email          : "whwu17@foxmail.com"
  github         : "whwu17"
  googlescholar  : "https://scholar.google.com/citations?user=NBSeJLkAAAAJ&hl=en&oi=sra"
