---
name: 'Home'
section_id: 'intro'
css_logo_class: 'bx-user'
priority: 10
---
<section class="section" id="{{ page.section_id }}">
  <div class="container">
    <div class="profile-row reveal">
      <div class="avatar-ring">
        <img src="{{ site.author.avatar | relative_url }}" alt="{{ site.author.name }}" onerror="this.style.display='none'">
      </div>
      <div class="profile-info">
        <span class="eyebrow"><span class="dot"></span> Welcome</span>
        <h2>Hi, I'm {{ site.author.name }}</h2>
        <p class="lead">{{ site.author.position }} · {{ site.author.location }}</p>
        <p class="muted" style="max-width:60ch">Below is a little more about who I am — and sections you can browse at your own pace.</p>
        <div class="btns">
          <a class="btn btn-primary" href="{{ '/about/' | relative_url }}">
            Learn more about me
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 17L17 7M9 7h8v8"></path></svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
