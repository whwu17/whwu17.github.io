<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link href="/assets/img/favicon.png" rel="icon">
  <link href="/assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  {% include stylesheets.html %}

  {% seo %}
</head>

<body>
  {% include liquid-glass-svg.html %}
  <a class="skip-link" href="#top">Skip to content</a>
  <div class="aurora" aria-hidden="true"></div>

  {% include site-nav.html %}

  <main id="top">
    {{ content }}
  </main>

  {% include site-footer.html %}

  <button class="ctrl ctrl--icon ctrl--glass to-top" id="to-top" type="button" aria-label="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>
  </button>

  <script src="{{ '/assets/js/glass-press.js' | relative_url }}" defer></script>
  <script>
    document.documentElement.classList.add('js');
    (function () {
      var html = document.documentElement;

      /* Mobile nav */
      var header = document.getElementById('site-header');
      var nav = document.getElementById('site-nav');
      var navToggle = document.getElementById('nav-toggle');
      var navLinks = document.getElementById('nav-links');
      var navScrim = document.getElementById('nav-scrim');
      var navCloseTimer = null;
      var NAV_ANIM_MS = 340;
      function setNavOpen(open) {
        if (!nav || !navToggle) return;
        clearTimeout(navCloseTimer);
        if (open) {
          if (navLinks) navLinks.setAttribute('aria-hidden', 'false');
          if (navScrim) navScrim.setAttribute('aria-hidden', 'false');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              nav.classList.add('open');
              if (header) header.classList.add('is-nav-open');
            });
          });
        } else {
          nav.classList.remove('open');
          if (header) header.classList.remove('is-nav-open');
          navCloseTimer = setTimeout(function () {
            if (navLinks) navLinks.setAttribute('aria-hidden', 'true');
            if (navScrim) navScrim.setAttribute('aria-hidden', 'true');
          }, NAV_ANIM_MS);
        }
        navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        navToggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
        document.body.style.overflow = open ? 'hidden' : '';
      }
      setNavOpen(false);
      if (navToggle && nav) navToggle.addEventListener('click', function () {
        setNavOpen(!nav.classList.contains('open'));
      });
      if (navScrim) navScrim.addEventListener('click', function () { setNavOpen(false); });
      if (navLinks) navLinks.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () { setNavOpen(false); });
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && nav && nav.classList.contains('open')) setNavOpen(false);
      });

      /* Reveal on scroll */
      var reveals = document.querySelectorAll('.reveal');
      var hero = document.getElementById('hero');
      if (hero) {
        requestAnimationFrame(function () { hero.classList.add('is-visible'); });
      }
      if ('IntersectionObserver' in window && reveals.length) {
        var ro = new IntersectionObserver(function (entries) {
          entries.forEach(function (en) {
            if (en.isIntersecting) { en.target.classList.add('in'); ro.unobserve(en.target); }
          });
        }, { threshold: 0.12 });
        reveals.forEach(function (el) {
          if (hero && hero.contains(el)) return;
          ro.observe(el);
        });
      } else {
        reveals.forEach(function (el) { el.classList.add('in'); });
      }

      /* Scrollspy for nav links + adaptive nav tone on dark sections */
      var LIGHT_TONE_THEMES = ['theme-music', 'theme-encrypt'];
      function navToneFor(sec) {
        if (!sec) return 'dark';
        for (var t = 0; t < LIGHT_TONE_THEMES.length; t++) {
          if (sec.classList.contains(LIGHT_TONE_THEMES[t])) return 'light';
        }
        return 'dark';
      }
      function setNavTone(sec) {
        if (header && sec) header.setAttribute('data-nav-tone', navToneFor(sec));
      }

      var spies = document.querySelectorAll('[data-spy]');
      var sections = [];
      spies.forEach(function (link) {
        var sec = document.getElementById(link.getAttribute('data-spy'));
        if (sec) sections.push({ link: link, sec: sec });
      });
      var heroSec = hero;
      if (heroSec) sections.push({ link: null, sec: heroSec });

      if (sections.length && 'IntersectionObserver' in window) {
        var so = new IntersectionObserver(function (entries) {
          entries.forEach(function (en) {
            if (en.isIntersecting) {
              spies.forEach(function (l) { l.classList.remove('active'); });
              var match = null;
              for (var i = 0; i < sections.length; i++) {
                if (sections[i].sec === en.target) { match = sections[i]; break; }
              }
              if (match) {
                if (match.link) match.link.classList.add('active');
                setNavTone(match.sec);
              }
            }
          });
        }, { rootMargin: '-45% 0px -50% 0px' });
        sections.forEach(function (s) { so.observe(s.sec); });
      } else if (heroSec) {
        setNavTone(heroSec);
      }

      /* Back to top */
      var toTop = document.getElementById('to-top');
      if (toTop) {
        window.addEventListener('scroll', function () {
          toTop.classList.toggle('show', window.scrollY > 600);
        }, { passive: true });
        toTop.addEventListener('click', function () {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      /* Analog world clocks — Shanghai + visitor or UTC */
      try {
        var homeTz = 'Asia/Shanghai';
        var greetingEl = document.getElementById('clock-greeting');
        var tzSha = document.getElementById('tz-sha');
        var tzB = document.getElementById('tz-b');
        if (tzSha && tzB && window.Intl && Intl.DateTimeFormat) {
          var localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
          var secondTz = localTz !== homeTz ? localTz : 'UTC';
          tzB.setAttribute('data-tz', secondTz);

          var secondLabel = document.getElementById('clock-label-b');
          var cityFromTz = function (tz) {
            if (tz === 'UTC') return 'UTC';
            var part = tz.split('/').pop() || tz;
            return part.replace(/_/g, ' ');
          };
          if (secondLabel) {
            secondLabel.textContent = localTz !== homeTz ? cityFromTz(localTz) : 'UTC';
          }

          var timeFmt = function (tz) {
            return new Intl.DateTimeFormat('en-GB', {
              timeZone: tz,
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            });
          };
          var dateFmt = function (tz) {
            return new Intl.DateTimeFormat('en-GB', {
              timeZone: tz,
              weekday: 'short',
              month: 'short',
              day: 'numeric'
            });
          };
          var partsFmt = function (tz) {
            return new Intl.DateTimeFormat('en-GB', {
              timeZone: tz,
              hour: 'numeric',
              minute: 'numeric',
              second: 'numeric',
              hour12: false
            });
          };

          function getParts(tz, now) {
            var p = {};
            partsFmt(tz).formatToParts(now).forEach(function (x) {
              if (x.type !== 'literal') p[x.type] = parseInt(x.value, 10);
            });
            return p;
          }

          function updateDial(tzEl, tz, now) {
            var p = getParts(tz, now);
            var h = p.hour % 12;
            var m = p.minute;
            var s = p.second;
            var dial = tzEl.querySelector('.analog__dial');
            if (!dial) return;
            dial.style.setProperty('--deg-h', (h * 30 + m * 0.5) + 'deg');
            dial.style.setProperty('--deg-m', (m * 6 + s * 0.1) + 'deg');
            dial.style.setProperty('--deg-s', (s * 6) + 'deg');
            dial.style.setProperty('--sky-rot', (p.hour * 15) + 'deg');
            tzEl.classList.toggle('is-night', p.hour < 6 || p.hour >= 20);
          }

          var tick = function () {
            var now = new Date();
            updateDial(tzSha, homeTz, now);
            updateDial(tzB, secondTz, now);

            var shaTime = document.getElementById('clock-sha');
            var shaDate = document.getElementById('date-sha');
            var clockB = document.getElementById('clock-b');
            var bDate = document.getElementById('date-b');
            if (shaTime) shaTime.textContent = timeFmt(homeTz).format(now);
            if (shaDate) shaDate.textContent = dateFmt(homeTz).format(now);
            if (clockB) clockB.textContent = timeFmt(secondTz).format(now);
            if (bDate) bDate.textContent = dateFmt(secondTz).format(now);

            if (greetingEl) {
              var hp = getParts(homeTz, now).hour;
              greetingEl.textContent = hp < 5 ? 'Good night' : hp < 12 ? 'Good morning' : hp < 17 ? 'Good afternoon' : 'Good evening';
            }
          };
          tick();
          setInterval(tick, 1000);
        }
      } catch (e) { /* clock is non-critical */ }
    })();
  </script>
</body>

</html>
