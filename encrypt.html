<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encryption</title>
  <link href="/assets/img/favicon.png" rel="icon">
  <link href="/assets/css/site.css?v={{ site.assets_version | default: 1 }}" rel="stylesheet">
  <link href="/assets/css/glass.css?v={{ site.assets_version | default: 1 }}" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(165deg, #f8f9fe 0%, #eef1f8 100%);
    }
    .encrypt-card {
      width: min(100%, 480px);
      overflow: hidden;
    }
    .encrypt-card__head {
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 0.5px solid var(--glass-border);
    }
    .encrypt-card__body { padding: 20px; display: grid; gap: 16px; }
    .encrypt-row { display: flex; gap: 8px; align-items: stretch; }
    .encrypt-row .input { flex: 1; min-width: 0; height: 44px; }
    .encrypt-row .btn { flex: none; min-height: 44px; padding: 0 18px; }
    #info { display: none; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(29, 29, 31, 0.88);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%); }
  </style>
</head>
<body>
  <div class="info-card encrypt-card" id="front-page">
    <div class="encrypt-card__head">Enter the key</div>
    <div class="encrypt-card__body">
      <div class="encrypt-row">
        <input class="input" type="password" id="pwd" autocomplete="off" placeholder="Password">
        <button class="btn btn-primary" type="button" onclick="showInfo()">Enter</button>
      </div>
    </div>
  </div>

  <div class="info-card encrypt-card" id="info">
    <div class="encrypt-card__head">Feature</div>
    <div class="encrypt-card__body">
      <div class="field">
        <label for="addr">Server address</label>
        <div class="encrypt-row">
          <input class="input" type="text" id="addr" readonly>
          <button class="btn btn-ghost" type="button" data-copy="#addr">Copy</button>
        </div>
      </div>
      <div class="field">
        <label for="addr2">Server password</label>
        <div class="encrypt-row">
          <input class="input" type="text" id="addr2" readonly>
          <button class="btn btn-ghost" type="button" data-copy="#addr2">Copy</button>
        </div>
      </div>
      <div class="field">
        <label for="addr3">Router password</label>
        <div class="encrypt-row">
          <input class="input" type="text" id="addr3" readonly>
          <button class="btn btn-ghost" type="button" data-copy="#addr3">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script src="/assets/js/sha512.js"></script>
  <script src="/assets/js/glass-press.js" defer></script>
  <script>
    var pwd;

    function showInfo() {
      pwd = document.getElementById('pwd').value;
      document.getElementById('front-page').style.display = 'none';
      document.getElementById('info').style.display = 'block';

      var keys = [
        '1177009048a002034a00201220030292006014a002008c012060200607080151071012113e0060177010',
        '0845008009300601980140983007043b0120562006125f013110001206620061017018',
        '061d006105200802510170167019041200603610170206002030101212350120578006'
      ];
      ['addr', 'addr2', 'addr3'].forEach(function (id, i) {
        var el = document.getElementById(id);
        var val = resolveKey(pwd, keys[i]);
        el.value = val;
        el.placeholder = val;
      });
    }

    function legacyCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
      document.body.removeChild(ta);
      return ok ? Promise.resolve() : Promise.reject();
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).catch(function () { return legacyCopy(text); });
      }
      return legacyCopy(text);
    }

    function flashToast() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 1600);
    }

    document.querySelectorAll('[data-copy]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var el = document.querySelector(btn.getAttribute('data-copy'));
        if (!el || !el.value) return;
        copyText(el.value).then(flashToast);
      });
    });
  </script>
</body>
</html>
